{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">素材选择</h3>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <!-- 片头选择 -->
                <div class="col-md-6 col-lg-4">
                    <div class="form-group">
                        <label for="header-file-select" class="form-label">
                            <i class="fas fa-film me-2"></i>片头视频
                        </label>
                        <select id="header-file-select" class="form-select">
                            <option value="">请选择片头视频...</option>
                            {% for file in files %}
                                <option value="{{ file.filename }}">{{ file.filename }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 片尾选择 -->
                <div class="col-md-6 col-lg-4">
                    <div class="form-group">
                        <label for="footer-file-select" class="form-label">
                            <i class="fas fa-film me-2"></i>片尾视频
                        </label>
                        <select id="footer-file-select" class="form-select">
                            <option value="">请选择片尾视频...</option>
                            {% for file in files %}
                                <option value="{{ file.filename }}">{{ file.filename }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 过渡页选择 -->
                <div class="col-md-6 col-lg-4">
                    <div class="form-group">
                        <label for="transition-file-select" class="form-label">
                            <i class="fas fa-random me-2"></i>过渡效果
                        </label>
                        <select id="transition-file-select" class="form-select">
                            <option value="">请选择过渡效果...</option>
                            {% for file in files %}
                                <option value="{{ file.filename }}">{{ file.filename }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 竖版背景1选择 -->
                <div class="col-md-6 col-lg-4">
                    <div class="form-group">
                        <label for="background-file-select" class="form-label">
                            <i class="fas fa-image me-2"></i>竖版文字背景图1
                        </label>
                        <select id="background-file-select" class="form-select">
                            <option value="">请选择背景图片1...</option>
                            {% for file in files %}
                                <option value="{{ file.filename }}">{{ file.filename }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 竖版背景2选择 -->
                <div class="col-md-6 col-lg-4">
                    <div class="form-group">
                        <label for="background2-file-select" class="form-label">
                            <i class="fas fa-image me-2"></i>竖版文字背景图2
                        </label>
                        <select id="background2-file-select" class="form-select">
                            <option value="">请选择背景图片2...</option>
                            {% for file in files %}
                                <option value="{{ file.filename }}">{{ file.filename }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">文件列表</h2>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>文件名</th>
                            <th>大小（MB）</th>
                            <th>上传时间</th>
                            <th>文件地址</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for file in files %}
                        <tr>
                            <td>
                                <i class="fas fa-file-video text-primary me-2"></i>
                                {{ file.filename }}
                            </td>
                            <td>{{ (file.size / (1024*1024))|round(2) }}</td>
                            <td>{{ file.upload_time.strftime('%Y-%m-%d %H:%M') }}</td>
                            <td>
                                <a href="{{ file.oss_url }}" target="_blank" class="text-truncate d-inline-block" style="max-width: 200px;" title="{{ file.oss_url }}">
                                    {{ file.oss_url }}
                                </a>
                            </td>
                            <td class="text-center">
                                <form method="post" action="/api/delete/{{ file.id }}" class="d-inline">
                                    <button type="submit" class="btn btn-danger btn-sm" 
                                            onclick="return confirm('确定要删除这个文件吗?')"
                                            title="删除文件">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- 添加 Font Awesome 图标支持 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
.upload-area {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
    background: #f8f9fa;
}

.upload-area.dragover {
    border-color: #0d6efd;
    background: #e9ecef;
}

.form-select {
    border-radius: 6px;
    border: 1px solid #ced4da;
    padding: 0.5rem;
    transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
}

.form-select:focus {
    border-color: #86b7fe;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}

.form-label {
    font-weight: 500;
    color: #495057;
    margin-bottom: 0.5rem;
}

.card {
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    margin-bottom: 1.5rem;
}

.card-header {
    background: linear-gradient(45deg, #0d6efd, #0a58ca);
}

.form-group {
    background: #f8f9fa;
    padding: 1rem;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.form-group:hover {
    background: #e9ecef;
    transform: translateY(-2px);
}
</style>
{% endblock %}
