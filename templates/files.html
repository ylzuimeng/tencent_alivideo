{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">文件列表</h2>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>文件名</th>
                            <th>大小（MB）</th>
                            <th>上传时间</th>
                            <th>文件地址</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for file in files %}
                        <tr>
                            <td>
                                <i class="fas fa-file-video text-primary me-2"></i>
                                {{ file.filename }}
                            </td>
                            <td>{{ (file.size / (1024*1024))|round(2) }}</td>
                            <td>{{ file.upload_time.strftime('%Y-%m-%d %H:%M') }}</td>
                            <td>
                                <a href="{{ file.oss_url }}" target="_blank" class="text-truncate d-inline-block" style="max-width: 200px;" title="{{ file.oss_url }}">
                                    {{ file.oss_url }}
                                </a>
                            </td>
                            <td class="text-center">
                                <form method="post" action="/api/delete/{{ file.id }}" class="d-inline">
                                    <button type="submit" class="btn btn-danger btn-sm" 
                                            onclick="return confirm('确定要删除这个文件吗?')"
                                            title="删除文件">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 添加 Font Awesome 图标支持 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
.table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.table td, .table th {
    vertical-align: middle;
}

.text-truncate {
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
}

.btn-sm {
    padding: 0.25rem 0.5rem;
    font-size: 0.875rem;
}
</style>
{% endblock %}
