<!DOCTYPE html>
<html>
<head>
    <title>文件管理器</title>
</head>
<body>
    <h1>文件上传</h1>
    <form method="post" enctype="multipart/form-data" action="/upload">
        <input type="file" name="file" required>
        <button type="submit">上传</button>
    </form>

    <h2>文件列表</h2>
    <table border="1">
        <tr>
            <th>文件名</th>
            <th>大小（KB）</th>
            <th>上传时间</th>
            <th>文件oss地址</th>
            <th>删除</th>
        </tr>
        {% for file in files %}
        <tr>
            <td>{{ file.filename }}</td>
            <td>{{ (file.size / 1024)|round(2) }}</td>
            <td>{{ file.upload_time.strftime('%Y-%m-%d %H:%M') }}</td>
            <td>{{ file.oss_url }}</td>
            <td>
                <form method="post" action="/api/delete/{{ file.id }}" style="display: inline;">
                    <button type="submit" onclick="return confirm('确定要删除这个文件吗?')">删除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
