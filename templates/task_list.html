{% extends "base.html" %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>任务列表</h2>
        <button onclick="loadTasks()" class="btn btn-outline-primary">
            <i class="fas fa-sync-alt"></i> 刷新
        </button>
    </div>

    <!-- 任务筛选按钮组 -->
    <div class="task-filters mb-4">
        <div class="btn-group" role="group" aria-label="任务筛选">
            <button type="button" class="btn btn-outline-primary active" data-filter="all" onclick="filterTasks('all')">
                <i class="fas fa-list me-1"></i>全部任务
            </button>
            <button type="button" class="btn btn-outline-primary" data-filter="pending" onclick="filterTasks('pending')">
                <i class="fas fa-clock me-1"></i>等待中
            </button>
            <button type="button" class="btn btn-outline-primary" data-filter="processing" onclick="filterTasks('processing')">
                <i class="fas fa-spinner fa-spin me-1"></i>处理中
            </button>
            <button type="button" class="btn btn-outline-primary" data-filter="completed" onclick="filterTasks('completed')">
                <i class="fas fa-check-circle me-1"></i>已完成
            </button>
            <button type="button" class="btn btn-outline-primary" data-filter="failed" onclick="filterTasks('failed')">
                <i class="fas fa-times-circle me-1"></i>失败
            </button>
        </div>
    </div>

    <!-- 任务列表容器 -->
    <div id="tasksContainer" class="row">
        <!-- 任务卡片将通过JavaScript动态生成 -->
    </div>

    <!-- 空状态提示 -->
    <div id="emptyState" class="text-center py-5" style="display: none;">
        <i class="fas fa-tasks fa-3x text-muted mb-3"></i>
        <p class="text-muted">暂无处理任务</p>
        <a href="{{ url_for('upload') }}" class="btn btn-primary">
            <i class="fas fa-upload"></i> 上传视频开始处理
        </a>
    </div>

    <!-- 加载中提示 -->
    <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-3 text-muted">正在加载任务列表...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<script>
let refreshInterval;
let currentFilter = 'all';  // 当前筛选状态
let allTasks = [];  // 保存所有任务数据

// 页面加载时获取任务列表
document.addEventListener('DOMContentLoaded', function() {
    loadTasks();
    // 每5秒自动刷新
    refreshInterval = setInterval(loadTasks, 5000);
});

// 页面卸载时清除定时器
window.addEventListener('beforeunload', function() {
    if (refreshInterval) {
        clearInterval(refreshInterval);
    }
});

// 加载任务列表
async function loadTasks() {
    try {
        const response = await fetch('/api/tasks');
        const tasks = await response.json();

        // 保存所有任务数据
        allTasks = tasks;

        // 根据当前筛选状态渲染任务
        renderTasks(tasks);
    } catch (error) {
        console.error('加载任务列表失败:', error);
        showError('加载任务列表失败，请稍后重试');
    }
}

// 筛选任务
function filterTasks(filterType) {
    currentFilter = filterType;

    // 更新按钮状态
    document.querySelectorAll('.task-filters .btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-filter') === filterType) {
            btn.classList.add('active');
        }
    });

    // 重新渲染任务列表
    if (filterType === 'all') {
        renderTasks(allTasks);
    } else {
        const filteredTasks = allTasks.filter(task => task.status === filterType);
        renderTasks(filteredTasks);
    }
}

// 渲染任务列表
function renderTasks(tasks) {
    const container = document.getElementById('tasksContainer');
    const emptyState = document.getElementById('emptyState');
    const loadingState = document.getElementById('loadingState');

    // 隐藏加载状态
    loadingState.style.display = 'none';

    // 清空容器
    container.innerHTML = '';

    if (!tasks || tasks.length === 0) {
        emptyState.style.display = 'block';
        return;
    }

    emptyState.style.display = 'none';

    // 渲染每个任务
    tasks.forEach(task => {
        const taskCard = createTaskCard(task);
        container.appendChild(taskCard);
    });
}

// 创建任务卡片
function createTaskCard(task) {
    const col = document.createElement('div');
    col.className = 'col-md-6 col-lg-4 mb-4';

    const statusBadge = getStatusBadge(task.status);
    const progressBar = getProgressBar(task.status, task.progress);

    col.innerHTML = `
        <div class="card task-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="task-name">${escapeHtml(task.task_name)}</span>
                ${statusBadge}
            </div>
            <div class="card-body">
                ${progressBar}

                <div class="task-info mt-3">
                    <p class="mb-1"><small class="text-muted">创建时间:</small> ${formatDate(task.created_at)}</p>
                    ${task.completed_at ? `<p class="mb-1"><small class="text-muted">完成时间:</small> ${formatDate(task.completed_at)}</p>` : ''}
                    ${task.error_message ? `<p class="mb-0 text-danger"><small>${escapeHtml(task.error_message)}</small></p>` : ''}
                </div>
            </div>
            <div class="card-footer">
                <div class="btn-group w-100" role="group">
                    ${task.status === 'completed' ? `
                        <a href="${task.output_oss_url}" target="_blank" class="btn btn-success flex-grow-1">
                            <i class="fas fa-download"></i> 下载成品
                        </a>
                    ` : task.status === 'failed' ? `
                        <button class="btn btn-warning flex-grow-1" onclick="alert('重试功能开发中')">
                            <i class="fas fa-redo"></i> 重试
                        </button>
                    ` : `
                        <button class="btn btn-outline-secondary flex-grow-1" disabled>
                            <i class="fas fa-spinner fa-spin"></i> 处理中...
                        </button>
                    `}
                    <button class="btn btn-outline-danger" onclick="deleteTask(${task.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    `;

    return col;
}

// 获取状态徽章
function getStatusBadge(status) {
    const badges = {
        'pending': '<span class="badge bg-secondary">等待中</span>',
        'processing': '<span class="badge bg-primary">处理中</span>',
        'completed': '<span class="badge bg-success">已完成</span>',
        'failed': '<span class="badge bg-danger">失败</span>'
    };
    return badges[status] || '<span class="badge bg-secondary">未知</span>';
}

// 获取进度条
function getProgressBar(status, progress) {
    const percentage = progress || 0;
    const color = status === 'failed' ? 'bg-danger' : (status === 'completed' ? 'bg-success' : 'bg-primary');

    return `
        <div class="progress" style="height: 25px;">
            <div class="progress-bar ${color}" role="progressbar"
                 style="width: ${percentage}%"
                 aria-valuenow="${percentage}"
                 aria-valuemin="0"
                 aria-valuemax="100">
                ${percentage}%
            </div>
        </div>
    `;
}

// 删除任务
async function deleteTask(taskId) {
    if (!confirm('确定要删除这个任务吗？')) {
        return;
    }

    try {
        const response = await fetch(`/api/tasks/${taskId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            alert('任务删除成功');
            loadTasks();
        } else {
            const error = await response.json();
            showError(error.error || '删除任务失败');
        }
    } catch (error) {
        console.error('删除任务失败:', error);
        showError('删除任务失败，请稍后重试');
    }
}

// 显示错误消息
function showError(message) {
    alert(message);
}

// HTML转义
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 格式化日期
function formatDate(dateString) {
    if (!dateString) return '-';
    const date = new Date(dateString);
    return date.toLocaleString('zh-CN');
}
</script>

<style>
.task-card {
    transition: transform 0.2s, box-shadow 0.2s;
}

.task-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.task-name {
    font-weight: 600;
    color: #333;
}

.progress-bar {
    font-weight: 500;
    line-height: 25px;
}

.btn-group .btn {
    border-radius: 0;
}

.btn-group .btn:first-child {
    border-top-left-radius: 0.25rem;
    border-bottom-left-radius: 0.25rem;
}

.btn-group .btn:last-child {
    border-top-right-radius: 0.25rem;
    border-bottom-right-radius: 0.25rem;
}
</style>
{% endblock %}
