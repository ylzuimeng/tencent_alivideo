{% block head %}

{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>任务列表</h2>
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>任务ID</th>
                    <th>文件名</th>
                    <th>模板</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="taskListBody">
                <!-- 任务列表将通过JavaScript动态加载 -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
