{% extends "base.html" %}

{% block content %}
<div class="upload-container">
    <h2>文件上传</h2>
    <div class="upload-area" id="dropZone">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="fileInput" class="form-label">选择文件</label>
                <input type="file" class="form-control" id="fileInput" multiple accept="video/*">
            </div>
            <div class="mb-3">
                <label for="templateSelect" class="form-label">选择模板</label>
                <select class="form-select" id="templateSelect">
                    <option value="">请选择处理模板</option>
                    <option value="template1">模板1 - 标准字幕</option>
                    <option value="template2">模板2 - 双语字幕</option>
                    <option value="template3">模板3 - 特效字幕</option>
                    <option value="template4">模板4 - 自定义样式</option>
                </select>
            </div>
            <div class="progress mb-3 d-none">
                <div class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <button type="submit" class="btn btn-primary">上传</button>
        </form>
    </div>
    <div id="fileList" class="mt-3">
        <h4>上传队列</h4>
        <table class="table">
            <thead>
                <tr>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>状态</th>
                    <th>进度</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="fileListBody">
            </tbody>
        </table>
    </div>
</div>

<style>
.upload-area {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
    background: #f8f9fa;
}

.upload-area.dragover {
    border-color: #0d6efd;
    background: #e9ecef;
}
</style>
{% endblock %}

{% block scripts %}
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileListBody = document.getElementById('fileListBody');
const uploadForm = document.getElementById('uploadForm');
const progressBar = document.querySelector('.progress-bar');
const progress = document.querySelector('.progress');

let uploadQueue = [];
let currentUploads = 0;
const MAX_CONCURRENT_UPLOADS = 3;

// 拖拽上传相关事件处理
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    handleFiles(files);
});

// 文件选择处理
fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
});

// 文件处理函数
function handleFiles(files) {
    Array.from(files).forEach(file => {
        // 检查文件类型
        if (!file.type.startsWith('video/')) {
            alert(`文件 ${file.name} 不是视频文件`);
            return;
        }
        
        // 添加到上传队列
        const fileId = Date.now() + Math.random().toString(36).substr(2, 9);
        const fileInfo = {
            id: fileId,
            file: file,
            status: 'pending',
            progress: 0
        };
        
        uploadQueue.push(fileInfo);
        addFileToTable(fileInfo);
    });
    
    // 开始处理队列
    processQueue();
}

// 添加文件到表格
function addFileToTable(fileInfo) {
    const row = document.createElement('tr');
    row.id = `file-${fileInfo.id}`;
    row.innerHTML = `
        <td>${fileInfo.file.name}</td>
        <td>${formatFileSize(fileInfo.file.size)}</td>
        <td class="status">等待上传</td>
        <td>
            <div class="progress">
                <div class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
        </td>
        <td>
            <button class="btn btn-sm btn-danger" onclick="cancelUpload('${fileInfo.id}')">取消</button>
        </td>
    `;
    fileListBody.appendChild(row);
}

// 处理上传队列
async function processQueue() {
    while (uploadQueue.length > 0 && currentUploads < MAX_CONCURRENT_UPLOADS) {
        const fileInfo = uploadQueue.shift();
        if (fileInfo.status !== 'cancelled') {
            currentUploads++;
            await uploadFile(fileInfo);
            currentUploads--;
        }
        processQueue();
    }
}

// 上传文件
async function uploadFile(fileInfo) {
    const formData = new FormData();
    formData.append('file', fileInfo.file);
    formData.append('template', document.getElementById('templateSelect').value);
    
    try {
        const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData,
            onUploadProgress: (progressEvent) => {
                const progress = Math.round((progressEvent.loaded * 100) / progressEvent.total);
                updateFileProgress(fileInfo.id, progress);
            }
        });
        
        if (response.ok) {
            const result = await response.json();
            updateFileStatus(fileInfo.id, 'success', '上传成功');
        } else {
            const error = await response.json();
            updateFileStatus(fileInfo.id, 'error', error.error || '上传失败');
        }
    } catch (error) {
        updateFileStatus(fileInfo.id, 'error', '上传失败');
        console.error('Upload error:', error);
    }
}

// 更新文件进度
function updateFileProgress(fileId, progress) {
    const row = document.getElementById(`file-${fileId}`);
    if (row) {
        const progressBar = row.querySelector('.progress-bar');
        progressBar.style.width = `${progress}%`;
        progressBar.setAttribute('aria-valuenow', progress);
    }
}

// 更新文件状态
function updateFileStatus(fileId, status, message) {
    const row = document.getElementById(`file-${fileId}`);
    if (row) {
        const statusCell = row.querySelector('.status');
        statusCell.textContent = message;
        row.className = status;
    }
}

// 取消上传
function cancelUpload(fileId) {
    const fileInfo = uploadQueue.find(f => f.id === fileId);
    if (fileInfo) {
        fileInfo.status = 'cancelled';
        updateFileStatus(fileId, 'cancelled', '已取消');
    }
}

// 格式化文件大小
function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}
</script>
{% endblock %}
